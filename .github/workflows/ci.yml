name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        run: pytest -v --tb=short

  helm:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint chart
        run: ./scripts/helm-lint.sh

  smoke:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for pipeline API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/health; then
              echo "Pipeline healthy"
              exit 0
            fi
            echo "Waiting for pipeline... ($i/60)"
            sleep 5
          done
          echo "Pipeline failed to become healthy"
          docker compose logs pipeline --tail 50
          exit 1

      - name: Verify metrics flowing
        run: |
          sleep 15
          METRICS=$(curl -sf http://localhost:8081/api/metrics)
          echo "$METRICS"
          echo "$METRICS" | python3 -c "
          import json, sys
          m = json.load(sys.stdin)
          assert m.get('events_ingested', 0) > 0, 'No events ingested'
          print(f\"OK: {m['events_ingested']} events ingested\")
          "

      - name: Tear down
        if: always()
        run: docker compose down -v