pipeline:
  name: telemetry-pipeline
  environment: docker

ingestion:
  transport: kafka
  kafka:
    bootstrap_servers: redpanda:9092
    topic: telemetry.events
    group_id: telemetry-pipeline
    auto_offset_reset: latest

validation:
  schema_path: config/schemas/sensor_event.json
  dedup_window_seconds: 5
  drop_invalid: true

processing:
  window_size_seconds: 10
  slide_interval_seconds: 2

storage:
  backend: timescale
  timescale:
    dsn: postgresql://telemetry:telemetry@timescaledb:5432/telemetry
    batch_size: 50
    flush_interval_seconds: 1.0

anomaly:
  enabled: true
  alert_threshold: 0.65
  ensemble_weights:
    statistical: 0.25
    isolation_forest: 0.30
    rule_based: 0.15
    autoencoder: 0.30
  autoencoder:
    enabled: true
    backend: numpy
    hidden_dim: 8
    min_samples: 20

simulator:
  devices: 10
  interval_ms: 100
  anomaly_rate: 0.03

viz:
  enabled: true
  host: 0.0.0.0
  port: 8080
  metrics_refresh_seconds: 1.0

prometheus:
  enabled: true
  namespace: telemetry