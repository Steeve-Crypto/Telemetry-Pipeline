pipeline:
  name: telemetry-pipeline
  environment: local

ingestion:
  transport: websocket  # mqtt | kafka | websocket
  mqtt:
    host: localhost
    port: 1883
    topic: sensors/+/telemetry
    qos: 1
  kafka:
    bootstrap_servers: localhost:9092
    topic: telemetry.events
    group_id: telemetry-pipeline
    auto_offset_reset: latest
    replay_mode: false
    enable_auto_commit: false
    commit_interval_seconds: 5.0
  websocket:
    host: 0.0.0.0
    port: 8765

validation:
  schema_path: config/schemas/sensor_event.json
  dedup_window_seconds: 5
  drop_invalid: true

processing:
  window_size_seconds: 10
  slide_interval_seconds: 2
  aggregations:
    - mean
    - min
    - max
    - std
    - count

storage:
  backend: timescale  # timescale | memory | clickhouse
  timescale:
    dsn: postgresql://telemetry:telemetry@localhost:5432/telemetry
    batch_size: 100
    flush_interval_seconds: 1.0
    retention_days: 90
    compression_after_days: 7
    enable_retention_policy: true
  clickhouse:
    host: localhost
    port: 8123
    database: telemetry
    user: default
    password: ""
    batch_size: 500

anomaly:
  enabled: true
  ensemble_weights:
    statistical: 0.25
    isolation_forest: 0.30
    rule_based: 0.15
    autoencoder: 0.30
  statistical:
    z_score_threshold: 3.5
    ewma_alpha: 0.1
    min_samples: 20
  isolation_forest:
    n_trees: 10
    window_size: 256
    seed: 42
  autoencoder:
    enabled: true
    backend: numpy
    hidden_dim: 8
    learning_rate: 0.01
    min_samples: 30
    error_threshold: 0.15
    models_per_sensor:
      industrial: models/industrial.onnx
      vehicle: models/vehicle.onnx
      network: models/network.onnx
  drift:
    enabled: true
    adwin_delta: 0.002
    check_interval_seconds: 30
  alert_threshold: 0.65

alerting:
  enabled: false
  slack_webhook_url: ""
  min_severity: medium
  cooldown_seconds: 60

simulator:
  devices: 5
  interval_ms: 100
  anomaly_rate: 0.02
  burst_mode: false

metrics:
  latency_histogram_buckets_ms: [1, 5, 10, 25, 50, 100, 250, 500, 1000]

viz:
  enabled: true
  host: 0.0.0.0
  port: 8080
  metrics_refresh_seconds: 1.0
  security:
    api_key: ""
    rate_limit_enabled: true
    rate_limit_rpm: 120

logging:
  format: console  # console | json (use json for Loki)
  level: info

opentelemetry:
  enabled: false
  endpoint: http://localhost:4318
  service_name: telemetry-pipeline

shutdown:
  drain_timeout_seconds: 10.0

tenancy:
  enabled: false
  default_tenant: default
  require_tenant_header: false
  tenant_api_keys: {}

prometheus:
  enabled: true
  namespace: telemetry

benchmark:
  default_events: 10000
  warmup_events: 500
  report_path: benchmark_report.json

eval:
  warmup_events: 50
  threshold: null
  report_path: eval_report.json
  threshold_sweep: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]