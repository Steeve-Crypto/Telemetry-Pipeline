services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./docker/init-timescale.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetry"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.5
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: redpandadata/redpanda:v24.1.5
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk topic create telemetry.events -p 3 -r 1 --brokers redpanda:9092 || true
        for tenant in default acme globex; do
          rpk topic create telemetry.events.${tenant} -p 3 -r 1 --brokers redpanda:9092 || true
        done
        echo "Kafka topics ready (shared + per-tenant)"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - path: .env
        required: false
    depends_on:
      timescaledb:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8081:8080"   # host 8081 — 8080 is often taken locally
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    command: >
      telemetry-pipeline --config /app/config/pipeline.docker.yaml --sensors /app/config/sensors.yaml

  simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    depends_on:
      pipeline:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
    restart: unless-stopped
    command: >
      sh -c "sleep 8 &&
      telemetry-simulator --config /app/config/pipeline.docker.yaml --sensors /app/config/sensors.yaml --duration 3600"

  prometheus:
    image: prom/prometheus:v2.52.0
    depends_on:
      pipeline:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.0.0
    depends_on:
      timescaledb:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yml:/etc/loki/loki-config.yml:ro

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    profiles:
      - clickhouse

volumes:
  timescale_data:
  grafana_data:
  clickhouse_data: