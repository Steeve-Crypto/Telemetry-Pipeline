apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telemetry-pipeline-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: telemetry-pipeline
    environment: dev
spec:
  project: telemetry
  source:
    repoURL: https://github.com/your-org/telemetry-pipeline.git
    targetRevision: main
    path: helm/telemetry-pipeline
    helm:
      releaseName: telemetry-pipeline
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: telemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5