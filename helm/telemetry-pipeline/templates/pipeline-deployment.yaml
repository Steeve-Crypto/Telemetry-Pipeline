{{- if .Values.pipeline.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "telemetry-pipeline.fullname" . }}
  namespace: {{ include "telemetry-pipeline.namespace" . }}
  labels:
    {{- include "telemetry-pipeline.pipelineLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pipeline.replicas }}
  selector:
    matchLabels:
      app: telemetry-pipeline
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: telemetry-pipeline
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "telemetry-pipeline.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.pipeline.terminationGracePeriodSeconds }}
      containers:
        - name: pipeline
          image: "{{ .Values.images.pipeline.repository }}:{{ .Values.images.pipeline.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          {{- if or .Values.secrets.create .Values.secrets.existingSecretName }}
          envFrom:
            - secretRef:
                name: {{ include "telemetry-pipeline.secretName" . }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          command:
            - telemetry-pipeline
            - --config
            - /app/config/pipeline.k8s.yaml
            - --sensors
            - /app/config/sensors.yaml
            {{- if .Values.pipeline.strictStartup }}
            - --strict
            {{- end }}
          resources:
            {{- toYaml .Values.pipeline.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      volumes:
        - name: config
          configMap:
            name: {{ include "telemetry-pipeline.configMapName" . }}
{{- end }}