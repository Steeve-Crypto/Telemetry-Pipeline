{{- if .Values.redpanda.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: {{ include "telemetry-pipeline.namespace" . }}
  labels:
    {{- include "telemetry-pipeline.labels" . | nindent 4 }}
    app: redpanda
spec:
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  selector:
    app: redpanda
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: {{ include "telemetry-pipeline.namespace" . }}
  labels:
    {{- include "telemetry-pipeline.labels" . | nindent 4 }}
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: redpanda
          image: {{ .Values.images.redpanda | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- if .Values.podSecurity.enabled }}
          securityContext:
            {{- include "telemetry-pipeline.redpandaContainerSecurityContext" . | nindent 12 }}
          {{- end }}
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp=1
            - --memory={{ .Values.redpanda.memory }}
            - --reserve-memory=0M
            - --node-id=0
            - --kafka-addr=internal://0.0.0.0:9092
            - --advertise-kafka-addr=internal://redpanda:9092
          ports:
            - containerPort: 9092
          readinessProbe:
            exec:
              command: ["sh", "-c", "rpk cluster health | grep -q Healthy"]
            initialDelaySeconds: 15
            periodSeconds: 10
{{- end }}