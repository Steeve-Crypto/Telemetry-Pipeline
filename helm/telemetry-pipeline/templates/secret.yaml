{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "telemetry-pipeline.secretName" . }}
  namespace: {{ include "telemetry-pipeline.namespace" . }}
  labels:
    {{- include "telemetry-pipeline.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  TELEMETRY_TENANT_KEYS: {{ .Values.secrets.tenantKeys | quote }}
  TELEMETRY_SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
{{- end }}