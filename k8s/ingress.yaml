apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: telemetry-pipeline
  namespace: telemetry
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: telemetry.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: telemetry-pipeline
                port:
                  number: 8080