apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-pipeline
  namespace: telemetry
  labels:
    app: telemetry-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry-pipeline
  template:
    metadata:
      labels:
        app: telemetry-pipeline
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: pipeline
          image: telemetry-pipeline:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: telemetry-secrets
                optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          command:
            - telemetry-pipeline
            - --config
            - /app/config/pipeline.k8s.yaml
            - --sensors
            - /app/config/sensors.yaml
            - --strict
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      volumes:
        - name: config
          configMap:
            name: telemetry-config