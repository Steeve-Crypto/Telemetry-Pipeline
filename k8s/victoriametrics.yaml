apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: telemetry
spec:
  ports:
    - port: 8428
      targetPort: 8428
  selector:
    app: victoriametrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.101.0
          args:
            - "-storageDataPath=/storage"
            - "-retentionPeriod=12"
            - "-httpListenAddr=:8428"
            - "-promscrape.config=/config/prometheus.yml"
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: storage
              mountPath: /storage
            - name: scrape-config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: storage
          emptyDir: {}
        - name: scrape-config
          configMap:
            name: telemetry-vm-scrape